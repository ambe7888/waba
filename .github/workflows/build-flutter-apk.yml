name: Build Flutter APK

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        channel: 'stable'

    - name: Install dependencies
      working-directory: whatsjet_mobile
      run: flutter pub get

    - name: Patch outdated plugins
      run: |
        find ~/.pub-cache/hosted/pub.dev -name build.gradle -exec sed -i 's/flutter.compileSdkVersion/34/g' {} +
        find ~/.pub-cache/hosted/pub.dev -name build.gradle -exec sed -i 's/flutter.minSdkVersion/21/g' {} +
        find ~/.pub-cache/hosted/pub.dev -name build.gradle -exec sed -i 's/flutter.targetSdkVersion/34/g' {} +

    - name: Build APK
      working-directory: whatsjet_mobile
      run: flutter build apk --release

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: whatsjet_mobile_apk
        path: whatsjet_mobile/build/app/outputs/flutter-apk/app-release.apk
