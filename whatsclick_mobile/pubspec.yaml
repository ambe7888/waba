name: whatsjet_mobile
description: "WhatsClick Mobile - Application de messagerie WhatsApp Business"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase & Notifications
  firebase_core: ^2.30.0
  firebase_messaging: ^14.9.0
  flutter_local_notifications: ^18.0.1

  # HTTP & Network
  http: ^1.2.1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Utilities
  intl: any
  url_launcher: any
  file_picker: any
  record: any
  path_provider: any
  http_parser: any
  mime: any

  # Fonts
  google_fonts: any
  qr_flutter: ^4.1.0
  fl_chart: ^1.2.0
  audioplayers: ^6.8.0
  flutter_html: ^3.0.0
  flutter_image_compress: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: any
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/launcher_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/launcher_icon.png"


flutter:
  uses-material-design: true

  assets:
    - assets/icon/app_logo.png
    - assets/icon/favicon.png
    - assets/icon/launcher_icon.png
